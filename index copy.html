<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Довідник БК</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    /* SPLASH */
    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      background-image: url("logo.webp");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      z-index: 9999;
      opacity: 1;
      transition: opacity .6s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* 🔥 КНОПКА ВИХОДУ */
    .logout-btn {
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #ff3b3b;
      background: transparent;
      color: #ff3b3b;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: #ff3b3b;
      color: #fff;
    }
  </style>
</head>

<body class="page-root">

  <!-- SPLASH -->
  <div id="splash"></div>

  <!-- CONTENT -->
  <header class="topbar">
    <h1 class="logo">Довідник БК</h1>

    <!-- 🔥 ОНОВЛЕНА КНОПКА -->
    <button class="logout-btn" onclick="App.logout()">
      Вийти
    </button>
  </header>

  <main class="center">
    <div class="grid-3">
      <a class="card big" href="rozvidka.html">
        <h2>Mavic/Autel</h2>
      </a>

      <a class="card big" href="bombers.html">
        <h2>Бомбери</h2>
      </a>

      <a class="card big" href="fpv.html">
        <h2>FPV</h2>
      </a>
    </div>
  </main>

  <footer class="footer">
    <small>Власність 125 ОВМБр</small>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const splash = document.getElementById("splash");

      const alreadyShown = localStorage.getItem("splashShown") === "1";

      if (alreadyShown) {
        splash.remove();
        return;
      }

      setTimeout(() => {
        splash.classList.add("hidden");

        setTimeout(() => {
          splash.remove();
        }, 600);

        localStorage.setItem("splashShown", "1");
      }, 1500);
    });
  </script>

  <script src="main.js"></script>
</body>
</html>
